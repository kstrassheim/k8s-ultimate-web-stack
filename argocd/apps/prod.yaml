# ==============================
# PROD — syncs from the latest semver git tag into ultimate-web-stack
#
# targetRevision is a semver constraint ('*' = highest tag), so ArgoCD resolves
# it to the newest vX.Y.Z tag — the same tag test tracks. The approval gate is
# in CI: the prod image (web:<tag>-prod) is only built after the GitHub `prod`
# environment is approved, so this app stays on the old image (rolling update
# keeps the running pods) until the approved build publishes the new one.
# ==============================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ultimate-web-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ultimate-web-stack
  source:
    repoURL: https://github.com/kstrassheim/k8s-ultimate-web-stack.git
    targetRevision: "*"
    path: k8s/environments/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ultimate-web-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
