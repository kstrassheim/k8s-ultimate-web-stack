# ==============================
# DEV — syncs from the main branch into ultimate-web-stack-dev
# ==============================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ultimate-web-stack-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ultimate-web-stack
  source:
    repoURL: https://github.com/kstrassheim/k8s-ultimate-web-stack.git
    targetRevision: main
    path: k8s/environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ultimate-web-stack-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
