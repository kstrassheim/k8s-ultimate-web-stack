# ==============================
# DEV — syncs from the main branch into ultimate-web-stack-dev
# ==============================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ultimate-web-stack-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ultimate-web-stack
  source:
    repoURL: https://github.com/kstrassheim/k8s-ultimate-web-stack.git
    targetRevision: main
    path: k8s/environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ultimate-web-stack-dev
  ignoreDifferences:
    # CI runs `kubectl rollout restart` to pull the mutable image tag; ignore
    # the annotation it stamps so selfHeal doesn't revert (and re-trigger) it.
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
