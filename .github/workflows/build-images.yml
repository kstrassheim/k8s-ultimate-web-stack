name: Build & Push Image

# Channel tags + CI roll. Each env has a mutable image tag; CI builds it and
# restarts the deployment to pull it (ArgoCD can't roll a same-tag image).
#   push main       -> dev  : web:dev (+ web:sha-<sha>) -> ultimate-web-stack-dev
#   create release  -> test : web:test                  -> ultimate-web-stack-test  (immediate)
#                   -> prod : web:prod                  -> ultimate-web-stack       (after `prod` approval)
#
# A "release" is just a GitHub Release / git tag (vX.Y.Z) — no script. Creating
# one builds the test image from that commit and rolls test; the prod image is
# built + rolled only after the `prod` GitHub environment is approved. test/prod
# ArgoCD apps track the latest tag for manifests; the image roll is the CI
# rollout-restart in _build-env.yml.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'        # vX.Y.Z
      - '[0-9]*'    # bare semver, e.g. 0.8 / 1.2.3

# Canonical app URL for the automated tester (claw-code-local). It must use the
# internal LAN ingress: it's a registered Entra redirect URI (so the bot can log
# in) and is NOT behind Cloudflare Access. The *.futuristic.science URLs are
# public (Cloudflare Access / Google SSO) and meant for humans — the bot has no
# Google identity. See README "Access URLs".
env:
  WEBAPP_URL: "https://datapi.galaxus.box/ultimate-web-stack-dev/"

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_build-env.yml
    secrets: inherit
    with:
      tf_env: dev
      gh_environment: dev
      image_tags: "mainpi.local:5000/ultimate-web-stack/web:dev mainpi.local:5000/ultimate-web-stack/web:sha-${{ github.sha }}"
      rollout_namespace: ultimate-web-stack-dev

  test:
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/_build-env.yml
    secrets: inherit
    with:
      tf_env: test
      gh_environment: test
      image_tags: "mainpi.local:5000/ultimate-web-stack/web:test"
      rollout_namespace: ultimate-web-stack-test

  prod:
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/_build-env.yml
    secrets: inherit
    with:
      tf_env: prod
      gh_environment: prod
      image_tags: "mainpi.local:5000/ultimate-web-stack/web:prod"
      rollout_namespace: ultimate-web-stack
