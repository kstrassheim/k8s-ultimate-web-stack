name: Build & Push Images

# Builds the backend + frontend images on the in-cluster self-hosted runner
# (docker-in-docker) and pushes them to the mainpi registry, then pins the
# matching environment overlay to the immutable image so ArgoCD rolls it out.
#
#   push main -> build :dev + :sha-<short>  -> pin k8s/environments/dev  -> dev
#   push prod -> build :test + :sha-<short> -> pin k8s/environments/test -> test
#
# Prod (tag-based) is handled by release.yml.
#
# The runner injects REGISTRY_URL / REGISTRY_USERNAME / REGISTRY_PASSWORD via
# the `registry-creds` secret and already trusts the registry CA.

on:
  push:
    branches:
      - main
      - prod
    # Don't rebuild on manifest/docs-only changes (incl. the bot's own
    # promote commit), which would otherwise loop.
    paths-ignore:
      - 'k8s/**'
      - 'argocd/**'
      - '**.md'

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: arc-runner-scale-k8s-ultimate-web-stack
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          repo="${REGISTRY_URL}/ultimate-web-stack/${{ matrix.component }}"
          short_sha="${GITHUB_SHA::7}"
          case "$GITHUB_REF" in
            refs/heads/main) channel=dev ;;
            refs/heads/prod) channel=test ;;
            *) echo "Unsupported ref $GITHUB_REF"; exit 1 ;;
          esac
          tags="${repo}:${channel} ${repo}:sha-${short_sha}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${tags}"

      - name: Log in to registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_URL" \
            --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build image
        run: |
          set -euo pipefail
          tag_args=""
          for t in ${{ steps.meta.outputs.tags }}; do tag_args="${tag_args} -t ${t}"; done
          # Build context is the repo root (Dockerfiles reference backend/ and frontend/)
          docker build ${tag_args} -f ${{ matrix.component }}/Dockerfile .

      - name: Push image
        run: |
          set -euo pipefail
          for t in ${{ steps.meta.outputs.tags }}; do
            docker push "${t}"
          done

  promote:
    needs: build-push
    runs-on: arc-runner-scale-k8s-ultimate-web-stack
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pin overlay to the new image and commit
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          case "$GITHUB_REF" in
            refs/heads/main) env_dir=k8s/environments/dev ;;
            refs/heads/prod) env_dir=k8s/environments/test ;;
            *) echo "Unsupported ref $GITHUB_REF"; exit 1 ;;
          esac
          # Overlay images use a single tag for backend + frontend; rewrite both.
          sed -i "s/^\( *newTag:\).*/\1 sha-${short_sha}/" "${env_dir}/kustomization.yaml"
          if git diff --quiet; then
            echo "Overlay already at sha-${short_sha}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${env_dir}/kustomization.yaml"
          git commit -m "ci: roll out sha-${short_sha} to ${env_dir##*/} [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
