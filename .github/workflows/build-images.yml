name: Build & Push Image

# Tag-driven promotion (one image per env, immutable tags):
#   push main   -> dev  : web:dev (+ web:sha-<sha>)   -> ultimate-web-stack-dev
#   create tag  -> test : web:<tag>-test (immutable)  -> ultimate-web-stack-test  (immediate)
#               -> prod : web:<tag>-prod (immutable)  -> ultimate-web-stack       (after `prod` approval)
#
# The test & prod ArgoCD apps both track the latest semver tag (targetRevision
# "*"), so creating a tag rolls test out right away; prod's image is only built
# once the `prod` GitHub environment is approved, so it lands on prod after that.
# Cut releases with scripts/release.sh, which pins each env's image newTag in the
# tagged commit so ArgoCD rolls the new build automatically.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'        # vX.Y.Z
      - '[0-9]*'    # bare semver, e.g. 0.8 / 1.2.3

# Canonical app URL for the automated tester (claw-code-local). It must use the
# internal LAN ingress: it's a registered Entra redirect URI (so the bot can log
# in) and is NOT behind Cloudflare Access. The *.futuristic.science URLs are
# public (Cloudflare Access / Google SSO) and meant for humans — the bot has no
# Google identity. See README "Access URLs".
env:
  WEBAPP_URL: "https://datapi.galaxus.box/ultimate-web-stack-dev/"

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_build-env.yml
    secrets: inherit
    with:
      tf_env: dev
      gh_environment: dev
      image_tags: "mainpi.local:5000/ultimate-web-stack/web:dev mainpi.local:5000/ultimate-web-stack/web:sha-${{ github.sha }}"

  test:
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/_build-env.yml
    secrets: inherit
    with:
      tf_env: test
      gh_environment: test
      image_tags: "mainpi.local:5000/ultimate-web-stack/web:${{ github.ref_name }}-test"

  prod:
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/_build-env.yml
    secrets: inherit
    with:
      tf_env: prod
      gh_environment: prod
      image_tags: "mainpi.local:5000/ultimate-web-stack/web:${{ github.ref_name }}-prod"
