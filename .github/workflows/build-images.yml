name: Build & Push Image

# Single deployment job: terraform apply (Azure OIDC) provisions the Entra App
# Reg and emits terraform.config.json, then the web image (FastAPI backend that
# also serves the React SPA, with the real Entra config baked in) is built and
# pushed to the mainpi registry. One job + per-ref `environment` so prod can be
# gated with a required-reviewers approval later.
#
#   push main      -> dev  : :dev   (+ :sha-<short>)  -> ultimate-web-stack-dev
#   push prod      -> test : :test  (+ :sha-<short>)  -> ultimate-web-stack-test
#   push tag vX.Y  -> prod : :prod  (+ :vX.Y.Z)       -> ultimate-web-stack
#
# ArgoCD auto-syncs the manifests; the deployment uses imagePullPolicy: Always,
# so the channel tag is re-pulled when pods restart.

on:
  push:
    branches:
      - main
      - prod
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform + build + push
    runs-on: arc-runner-scale-k8s-ultimate-web-stack
    # Per-ref environment (and its federated AZURE_CLIENT_ID). Add a required
    # reviewer on the `prod` environment to gate prod deployments.
    environment: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref == 'refs/heads/prod' && 'test' || 'prod' }}
    env:
      TF_ENV: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref == 'refs/heads/prod' && 'test' || 'prod' }}
      # azurerm provider/backend authenticate via the GitHub OIDC token (no az CLI).
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    concurrency:
      group: terraform-app-reg-${{ github.ref == 'refs/heads/main' && 'dev' || github.ref == 'refs/heads/prod' && 'test' || 'prod' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform apply + export config
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform init -backend-config="key=app-reg-${TF_ENV}.tfstate"
          terraform apply -auto-approve -no-color -var="env=${TF_ENV}"
          # Bake the Entra config into the build (frontend build + backend runtime).
          terraform output -json > "$GITHUB_WORKSPACE/frontend/terraform.config.json"
          cp "$GITHUB_WORKSPACE/frontend/terraform.config.json" "$GITHUB_WORKSPACE/backend/terraform.config.json"

      - name: Compute image tags + base path
        id: meta
        run: |
          set -euo pipefail
          # In-cluster, CoreDNS rewrites mainpi.local -> the registry Service;
          # this host matches the TLS cert and the image refs the deploys pull.
          repo="mainpi.local:5000/ultimate-web-stack/web"
          short_sha="${GITHUB_SHA::7}"
          # base = the ingress sub-path the SPA is served under per env.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tags="${repo}:prod ${repo}:${GITHUB_REF_NAME}"; base="/ultimate-web-stack/"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            tags="${repo}:dev ${repo}:sha-${short_sha}"; base="/ultimate-web-stack-dev/"
          elif [[ "$GITHUB_REF" == refs/heads/prod ]]; then
            tags="${repo}:test ${repo}:sha-${short_sha}"; base="/ultimate-web-stack-test/"
          else
            echo "Ref $GITHUB_REF is not a release ref; nothing to build."
            exit 1
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${tags}  Base: ${base}"

      - name: Log in to registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login mainpi.local:5000 \
            --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build image
        run: |
          set -euo pipefail
          tag_args=""
          for t in ${{ steps.meta.outputs.tags }}; do tag_args="${tag_args} -t ${t}"; done
          docker build ${tag_args} --build-arg BASE_PATH="${{ steps.meta.outputs.base }}" -f backend/Dockerfile .

      - name: Push image
        run: |
          set -euo pipefail
          for t in ${{ steps.meta.outputs.tags }}; do
            docker push "${t}"
          done
