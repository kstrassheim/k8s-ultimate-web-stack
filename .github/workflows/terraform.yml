name: Terraform App Reg

on:
  push:
    branches:
      - main
      - prod
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
      - prod
    paths:
      - terraform/**
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          echo "ARM_FEDERATED_TOKEN_FILE=${{ runner.temp }}/azure_federated_token" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          terraform init -backend-config="key=app-reg.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        id: plan
        run: terraform plan -out=tfplan

      - name: Comment Plan Output on PR
        if: github.event_name == 'pull_request'
        working-directory: terraform
        run: |
          terraform show tfplan > tfplan.txt
          comment_header="#### :hammer: Terraform Plan Summary\n\nPR: \`${{ github.event.pull_request.html_url }}\`\nEnvironment: \`${{ github.ref_name }}\`\n"
          echo -e "$comment_header" > comment.txt
          echo '```terraform' >> comment.txt
          cat tfplan.txt >> comment.txt
          echo '```' >> comment.txt
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Plan Artifact
        if: github.event_name == 'pull_request'
        working-directory: terraform
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.ref_name }}
          path: terraform/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod' || github.event_name == 'workflow_dispatch'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Upload Terraform Output
        if: github.ref == 'refs/heads/prod'
        working-directory: terraform
        run: |
          terraform output -json > terraform_output.json
        uses: actions/upload-artifact@v4
        with:
          name: terraform-config
          path: terraform/terraform_output.json
          retention-days: 7
