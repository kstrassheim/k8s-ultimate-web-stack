name: Terraform

# Plan runs on every PR to main/prod (apply lives in build-images.yml, on merge).
on:
  pull_request:
    branches:
      - main
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Apply now runs in build-images.yml (the deploy pipeline); this workflow only
# plans on PRs. Per-env concurrency (job level) keeps plan off an in-flight apply.

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    # PR base picks the env: PR -> prod plans test, otherwise dev.
    environment: ${{ github.base_ref == 'prod' && 'test' || 'dev' }}
    env:
      TF_ENV: ${{ github.base_ref == 'prod' && 'test' || 'dev' }}
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    concurrency:
      group: terraform-app-reg-${{ github.base_ref == 'prod' && 'test' || 'dev' }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    # Only run plan on PRs (for CI check) and manual dispatch — not on push to main/prod
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="key=app-reg-${TF_ENV}.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color -var="env=${TF_ENV}" -out=tfplan > tfplan_output.txt 2>&1 || true; terraform show -no-color tfplan >> tfplan_output.txt 2>&1 || true
        id: tfplan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 7

      - name: Post Terraform Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let planText = '(plan output not available)';
            try {
              const path = '${{ github.workspace }}/terraform/tfplan_output.txt';
              if (fs.existsSync(path)) {
                planText = fs.readFileSync(path, 'utf8').substring(0, 65536);
              }
            } catch (e) { /* ignore */ }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Terraform Plan\n\n```\n' + planText + '\n```'
            });
