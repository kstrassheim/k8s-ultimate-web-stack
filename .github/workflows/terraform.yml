name: Terraform

on:
  push:
    branches:
      - main
      - prod
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
      - prod
    # No `paths:` filter here — the `terraform-plan` job is a required
    # status check on `main`/`prod`, and the check must be reported on
    # every PR (even ones that don't touch terraform/) so branch
    # protection can gate the merge. With a paths filter, PRs that
    # don't touch terraform/ would have no `Terraform Plan` check_run
    # and the merge would stay blocked.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    # Only run plan on PRs (for CI check) and manual dispatch — not on push to main/prod
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        env:
          ARM_FEDERATED_TOKEN_FILE: ${{ runner.temp }}/azure_federated_token
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -backend-config="key=app-reg.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color -out=tfplan > tfplan_output.txt 2>&1 || true; terraform show -no-color tfplan >> tfplan_output.txt 2>&1 || true
        id: tfplan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 7

      - name: Post Terraform Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let planText = '(plan output not available)';
            try {
              const path = '${{ github.workspace }}/terraform/tfplan_output.txt';
              if (fs.existsSync(path)) {
                planText = fs.readFileSync(path, 'utf8').substring(0, 65536);
              }
            } catch (e) { /* ignore */ }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Terraform Plan\n\n```\n' + planText + '\n```'
            });

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        env:
          ARM_FEDERATED_TOKEN_FILE: ${{ runner.temp }}/azure_federated_token
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -backend-config="key=app-reg.tfstate"

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform
        continue-on-error: true

      - name: Terraform Apply
        working-directory: terraform
        run: |
          if [ -f tfplan ]; then
            terraform apply -auto-approve -no-color tfplan
          else
            terraform apply -auto-approve -no-color
          fi

      - name: Upload Terraform Output
        if: github.ref == 'refs/heads/prod'
        working-directory: terraform
        run: terraform output -json > terraform_output.json
        uses: actions/upload-artifact@v4
        with:
          name: terraform-config
          path: terraform/terraform_output.json
          retention-days: 7
