name: Terraform App Reg

on:
  push:
    branches:
      - main
      - prod
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
      - prod
    paths:
      - terraform/**
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          echo "ARM_FEDERATED_TOKEN_FILE=${{ runner.temp }}/azure_federated_token" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          terraform init -backend-config="key=app-reg.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan -no-color
          terraform show -no-color tfplan > plan.txt

      - name: Upload Terraform Plan artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt
          retention-days: 5

      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import subprocess

          with open("terraform/plan.txt", "r") as f:
            plan_content = f.read()

          # Trim if too long for GitHub comment (65536 char limit, keep 5000 buffer)
          if len(plan_content) > 60000:
            plan_content = plan_content[:59500] + "\n... (trimmed - see artifact for full plan)"

          plan_escaped = json.dumps(plan_content)[1:-1]  # remove outer quotes from json.dumps

          pr_number = os.environ["PR_NUMBER"]
          body = f"""## Terraform Plan :rocket:

<details>
<summary>Click to expand full plan</summary>

```terraform
{plan_escaped}
```

</details>"""

          result = subprocess.run(
            ["gh", "pr", "comment", pr_number, "--body", body],
            capture_output=True, text=True
          )
          if result.returncode != 0:
            print(f"Error posting comment: {result.stderr}")
            raise SystemExit(1)
          print("Comment posted successfully")
          PYEOF
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}

      - name: Terraform Apply
        if: github.event_name == 'push'
        working-directory: terraform
        run: terraform apply -auto-approve -no-color tfplan

      - name: Upload Terraform Output
        if: github.ref == 'refs/heads/prod' || github.event_name == 'workflow_dispatch'
        working-directory: terraform
        run: terraform output -json > terraform_output.json
        uses: actions/upload-artifact@v4
        with:
          name: terraform-config
          path: terraform/terraform_output.json
          retention-days: 7