# Lets the in-cluster GitHub Actions runner that builds this repo's images
# (`build-push` job in build-images.yml, via _build-env.yml) restart the `web`
# Deployment so a freshly-pushed mutable image tag (web:dev/test/prod) is
# pulled. The runner's ServiceAccount is otherwise permission-less; this grants
# only deployment rollout in the env namespace (set by the kustomize overlay).
#
# Same pattern as k8s-vscode-tunnel/k8s/01-runner-rbac.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-web-rollout
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-web-rollout
subjects:
  - kind: ServiceAccount
    name: arc-runner-scale-k8s-ultimate-web-stack-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runner-web-rollout
