apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: future-gadget-dev
  labels:
    app: backend
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: future-gadget-dev
  labels:
    app: backend
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: future-gadget-dev/backend:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MONGODB_URI
              value: mongodb://mongodb:27017
            - name: MONGODB_DB
              value: future_gadget_lab
            - name: MOCK
              value: "false"
            - name: PYTHONPATH
              value: /app
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5