# https://datapi.galaxus.box/ultimate-web-stack-dev -> web:8000
# rewrite-target strips the prefix so the backend serves at root; the SPA is
# built with Vite base=/ultimate-web-stack-dev/ so browser URLs keep the prefix.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    cert-manager.io/cluster-issuer: mainpi-ca
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: datapi.galaxus.box
      http:
        paths:
          - path: /ultimate-web-stack-dev(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  name: http
    - host: datapi.local
      http:
        paths:
          - path: /ultimate-web-stack-dev(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  name: http
