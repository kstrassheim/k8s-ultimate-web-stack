# https://datapi.galaxus.box/ultimate-web-stack-test -> web:8000
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    cert-manager.io/cluster-issuer: mainpi-ca
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Advertise the public sub-path so the backend injects the matching
    # <base href>; the Cloudflare tunnel sends no such header (root mount).
    nginx.ingress.kubernetes.io/x-forwarded-prefix: "/ultimate-web-stack-test"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: datapi.galaxus.box
      http:
        paths:
          - path: /ultimate-web-stack-test(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  name: http
    - host: datapi.local
      http:
        paths:
          - path: /ultimate-web-stack-test(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  name: http
