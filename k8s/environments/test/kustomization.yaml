# ==============================
# TEST environment  (namespace: ultimate-web-stack-test, deploys from tags)
# scripts/release.sh rewrites the image newTag below to <tag>-test (immutable)
# in the tagged commit, so ArgoCD rolls the new build automatically.
# ==============================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ultimate-web-stack-test

labels:
  - pairs:
      app.kubernetes.io/environment: test
    includeSelectors: false

resources:
  - ../base
  - ingress.yaml

images:
  - name: mainpi.local:5000/ultimate-web-stack/web
    newTag: test

patches:
  - path: patch-web-env.yaml
    target:
      kind: Deployment
      name: web
