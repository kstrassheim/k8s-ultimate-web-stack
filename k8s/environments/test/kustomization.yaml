# ==============================
# TEST environment  (namespace: ultimate-web-stack-test, deploys from prod branch)
# ==============================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ultimate-web-stack-test

labels:
  - pairs:
      app.kubernetes.io/environment: test
    includeSelectors: false

resources:
  - ../base

images:
  - name: mainpi.local:5000/ultimate-web-stack/web
    newTag: test

patches:
  - path: patch-web-env.yaml
    target:
      kind: Deployment
      name: web
