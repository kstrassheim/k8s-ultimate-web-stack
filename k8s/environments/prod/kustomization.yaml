# ==============================
# PROD environment  (namespace: ultimate-web-stack, deploys from tags)
# ==============================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ultimate-web-stack

labels:
  - pairs:
      app.kubernetes.io/environment: prod
    includeSelectors: false

resources:
  - ../base
  - ingress.yaml

images:
  - name: mainpi.local:5000/ultimate-web-stack/web
    newTag: prod

patches:
  - path: patch-web-env.yaml
    target:
      kind: Deployment
      name: web
