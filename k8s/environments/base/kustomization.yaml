# ==============================
# Base kustomization
# Aggregates the workload components. Namespace + per-env settings
# are applied by the environment overlays (dev / test / prod).
# ==============================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: ultimate-web-stack
    includeSelectors: false

resources:
  - ../../mongodb
  - ../../backend
  - ../../frontend
