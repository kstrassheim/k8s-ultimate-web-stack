# ==============================
# NetworkPolicies — allow rules layered on top of the cluster's injected
# `default-deny-all` (generated by the kyverno generate-default-deny-networkpolicy
# ClusterPolicy). Without these, all pod traffic in the namespace is blocked.
# ==============================

# DNS egress for all pods (CoreDNS) — needed to resolve service names.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Internet egress (443/80) for all pods — the backend validates Entra tokens
# (fetches OIDC/JWKS metadata from login.microsoftonline.com).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-internet
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
      to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
              - 192.168.1.0/24
              - 169.254.0.0/16
---
# web -> mongodb (egress from the web pods to the DB port).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-mongodb
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 27017
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.42.0.0/16
        - ipBlock:
            cidr: 10.43.0.0/16
---
# mongodb ingress on 27017 from in-cluster pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mongodb-ingress
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
        - ipBlock:
            cidr: 10.43.0.0/16
      ports:
        - port: 27017
          protocol: TCP
---
# web ingress on 8000 from the LAN and in-cluster (e.g. ingress-nginx).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.1.0/24
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - port: 8000
          protocol: TCP
